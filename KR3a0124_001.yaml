body:
  text: 袁子正書禮者兼仁義也虞世南北堂書鈔卷八十引袁子書禮者何也緣人情而為之節文者也嚴父愛親之情也尊君敬長之義也徐堅初學記卷十三立德蹈禮謂之英才子産季札人之英也文選任彥升出郡傳舍哭范僕射詩李善注歲比不登唯得賣棘栗瓜梨歐陽詢藝文類聚卷八十七凡不給之物若干蔗之屬皆可權禁太平御覽卷九百七十四引凡不上有歲比不登四字案此通上為一節文語曰歲在申酉乞漿得酒歲在辰已嫁妻賣子夫盛衰更代豐荒相半天之常道也太平御覽卷十七滑釐曰今當凶年有欲與子隨侯之珠者又有欲與子一鍾之粟者子將何擇釐曰居取粟可以救窮太平御覽卷三十五堯避舜於濟陰今定陶有堯冢信乎太平御覽卷八十一桀紂有民左億右億之衆四嶽三塗之險京山終南之固及在鳴條牧野一朝而失天下太平御覽卷八十二目以見小為明耳以聽大為聰太平御覽卷三百六十六聖人之治也若平地焉聾盲跛蹇皆能履之法若邱陵也非有逸足不能超也太平御覽卷四百一唯聖知聖唯賢知賢信乎同上楊子曰莊周何人哉袁子曰大而不撿重而威禍智人也太平御覽卷四百三十二學莫大於博行莫過於約聖人者天下之至智也博學以聚之兼聽而辨之太平御覽卷六百十二非所事而強學猶以百萬之師積之何濟之有其中用舟楫固不如江漢之良太平御覽卷七百六十九申屠剛諫光武以頭軔輪馬不得前子云光武近出未有得失而頭軔輪此之謂也太平御覽卷七百七十三輪車即輦魏晉公卿小出常乘馬亦多乘輿車漢諸侯貧者乃乘之其後轉見貴孫權云車中八牛即犢車也江左御出則載儲供之物漢世賤輅車而貴輜軿魏晉賤軿車而貴軺車又有追鋒如軺車而駕馬又以雲母飾犢牛謂之雲母車臣不得乘時以賜王公貴臣晉氏之有四望車今制亦存又漢制唯賈人不得乘馬車其餘皆乘之矣除更亦杜余則青蓋杜云其車法駕則紫罽軿車案字林軿車有衣蔽無後轅其後有轅者謂之幅同上牛馬之為駕乘者非樂負千鈞之重行千里之險鞭策痛矣太平御覽卷八百九十七袁子曰吾嘗與陳子息於鄴東門之外見一老父方坐而食其子授之蒜食必有餘欲棄則惜欲持去則暑遂盡食於是火辛螫其腸胃兩目盡赤陳子笑之吾謂曰子之家中牛羊數千而不敢食天暑有暍死者而後食之病子之軀亦猶是也太平御覽卷九百七十七山梁氏泥於西屠而染其齒太平御覽卷三百六十六孔子稱蘧伯玉國無道可卷而懷也今李膺居濁世之中皎然與世殊塗此西山餓夫之疇耳卒死於非罪惡得為雅人太平御覽卷四百四十七李膺言出于口人莫得違也有難李君之言者則鄉黨非之李君子與人同輿載則名聞天下同上或云少府揚阜豈非忠臣哉答曰然可謂直士忠則吾不知也夫為人臣見人主失道指斥其非而播揚其惡可謂直士未為忠臣故司馬陳群則不然其談論終日未嘗言人主之非書數十上而外人不知君子謂陳群於是乎長者藝文類聚卷二十二北堂書鈔卷五十四方丈之食不過一飽綈袍之繡不過一暖太平御覽卷八百四十九魏家置吏部尚書專選天下百官夫用人人君子所司不可以假人者也使治亂之柄制在一人之手權重而人才難得居此北堂書鈔作比職此才者未有一也北堂書鈔卷六十太平御覽卷二一十四已下並引袁子古者命士已上者皆有冠冕謂之冠族之家文選任彥升宣德皇后令李善注今有卿相之才居三公之位循藝文類聚引作修其治政以寧國家未必封侯也今軍政之法斬一牙門將封侯夫斬一將之功孰與安寧天下者乎安寧天下者不爵斬一將之功者封侯失封賞之意也太平御覽卷一百九十八春秋鄭莊公封母弟於京祭仲曰都城過制國之害也其後卒相攻伐國內大亂故過制則有強臣之禍鄙小則有微弱之憂秦以列國之勢而并天下自以由諸侯而起之也於是去五等之爵而致郡縣雖有親子母弟皆為匹夫及其衰匹夫一呼而天下去及至漢家見亡秦以孤特亡也於是大封子弟或連城數十廓地千里自關已東皆為王國力多而權重故亦有七國之難太平御覽卷一百九十八
